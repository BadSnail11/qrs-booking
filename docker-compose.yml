services:
  postgres:
    image: postgres:16
    container_name: qrs-postgres
    environment:
      POSTGRES_DB: qrs_booking
      POSTGRES_USER: qrs_user
      POSTGRES_PASSWORD: qrs_pass
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qrs_user -d qrs_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_MODULE: user_app:app
        APP_PORT: 8000
    container_name: qrs-user-app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: qrs_booking
      DB_USER: qrs_user
      DB_PASSWORD: qrs_pass
      APP_PORT: 8000
      MENU_UPLOAD_DIR: /data/menus
      OPEN_HOUR: 11
      CLOSE_HOUR: 22
      SLOT_MINUTES: 120
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADMIN_WEB_URL: ${ADMIN_WEB_URL:-http://localhost:3000/admin}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME:-QRS Booking}
    volumes:
      - menu_uploads:/data/menus
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  admin-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_MODULE: admin_app:app
        APP_PORT: 8001
    container_name: qrs-admin-app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: qrs_booking
      DB_USER: qrs_user
      DB_PASSWORD: qrs_pass
      APP_PORT: 8001
      MENU_UPLOAD_DIR: /data/menus
      SUPERADMIN_LOGIN: ${SUPERADMIN_LOGIN:-superadmin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-admin123}
      OPEN_HOUR: 11
      CLOSE_HOUR: 22
      SLOT_MINUTES: 120
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADMIN_WEB_URL: ${ADMIN_WEB_URL:-http://localhost:3000/admin}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME:-QRS Booking}
    volumes:
      - menu_uploads:/data/menus
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"

  booking-harats:
    build:
      context: ./booking_Harats
      dockerfile: Dockerfile
    container_name: qrs-booking-harats
    environment:
      ADMIN_INTERNAL_URL: http://admin-app:8001
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-change-me-admin-session}
      NEXT_PUBLIC_USER_API_URL: /api/user
      NEXT_PUBLIC_ADMIN_API_URL: /api/admin
    depends_on:
      user-app:
        condition: service_started
      admin-app:
        condition: service_started
    ports:
      - "3000:3000"

  adminer:
    image: adminer:latest
    container_name: qrs-adminer
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8088:8080"

volumes:
  pg_data:
  menu_uploads:
